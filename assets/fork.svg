<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800">
  <defs>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a2340;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="fBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <filter id="fGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="160" rx="15" fill="url(#fBg)" stroke="url(#fGrad)" stroke-width="2"/>
  <circle cx="80" cy="80" r="35" fill="none" stroke="url(#fGrad)" stroke-width="2" filter="url(#fGlow)"/>
  <text x="80" y="90" text-anchor="middle" fill="url(#fGrad)" font-family="Arial,sans-serif" font-size="30" filter="url(#fGlow)">&#127860;</text>
  <text x="420" y="50" text-anchor="middle" fill="url(#fGrad)" font-family="Arial,sans-serif" font-weight="bold" font-size="26" letter-spacing="2" filter="url(#fGlow)">FORK &amp; CONFIGURE</text>
  <text x="420" y="78" text-anchor="middle" fill="#8892a8" font-family="Arial,sans-serif" font-size="14" letter-spacing="1">Fork this Repl to set your own environment variables and start the bot</text>
  <rect x="270" y="95" width="260" height="42" rx="21" fill="url(#fBtn)"/>
  <text x="400" y="122" text-anchor="middle" fill="#0a0f1c" font-family="Arial,sans-serif" font-weight="bold" font-size="16" letter-spacing="1">Fork on Replit</text>
  <circle cx="680" cy="30" r="2.5" fill="#f97316" opacity="0.4"/>
  <circle cx="720" cy="130" r="2" fill="#fb923c" opacity="0.3"/>
  <circle cx="170" cy="25" r="2" fill="#f97316" opacity="0.5"/>
  <circle cx="750" cy="75" r="3" fill="#fb923c" opacity="0.2"/>
</svg>
