<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CASPER-XD-ULTRA</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-particles" id="particles"></div>
  <div class="container">
    <div class="header">
      <div class="logo-ring">
        <div class="logo-inner">CXU</div>
      </div>
      <h1 class="bot-name" id="botName">CASPER-XD-ULTRA</h1>
      <p class="subtitle">WhatsApp Bot <span id="botVersion"></span></p>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">Connecting...</span>
      </div>
      <a href="/settings.html" class="settings-link">&#9881; Settings</a>
    </div>

    <div class="info-cards">
      <div class="card owner-card">
        <div class="card-icon">&#128081;</div>
        <div class="card-label">Owner</div>
        <div class="card-value" id="ownerName">TRABY-CASPER</div>
      </div>
      <div class="card team-card">
        <div class="card-icon">&#128187;</div>
        <div class="card-label">Team</div>
        <div class="card-value" id="teamName">CASPER TECH KENYA DEVELOPERS</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">&#9200;</div>
        <div class="stat-label">Bot Uptime</div>
        <div class="stat-value" id="botUptime">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#128421;</div>
        <div class="stat-label">System Uptime</div>
        <div class="stat-value" id="sysUptime">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#9881;</div>
        <div class="stat-label">Platform</div>
        <div class="stat-value" id="platform">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#128268;</div>
        <div class="stat-label">Architecture</div>
        <div class="stat-value" id="arch">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#128200;</div>
        <div class="stat-label">CPU</div>
        <div class="stat-value small" id="cpu">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#128190;</div>
        <div class="stat-label">Memory</div>
        <div class="stat-value" id="memory">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#127760;</div>
        <div class="stat-label">Hostname</div>
        <div class="stat-value small" id="hostname">--</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">&#128218;</div>
        <div class="stat-label">Node.js</div>
        <div class="stat-value" id="nodeVersion">--</div>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2024 - 2026 CASPER TECH KENYA DEVELOPERS. All rights reserved.</p>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
